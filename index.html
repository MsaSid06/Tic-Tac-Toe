<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Game</title>
  </head>
  <body>
    <div class="alerte">
      <p class="messageBon"></p>
    </div>
    <div class="BadAlerte">
      <p class="messageMauvais"></p>
    </div>
    <div class="Neutre">
      <p class="messageNeutre"></p>
    </div>

    <header class="score result">
      <h1>SCORE</h1>
      <div class="div-button">
        <div>
          <button class="button red" style="opacity: 0.3" type="button">
            RED
          </button>
          <br />
          <p class="a a_red">0</p>
        </div>
        <div>
          <button class="button Continuer" type="button">CONTINUER</button>
        </div>
        <div>
          <button class="button restart" type="button">RESTART</button>
        </div>
        <div>
          <button class="button blue" type="button">BLUE</button>
          <br />
          <p class="a a_blue">0</p>
        </div>
      </div>
    </header>
    <main>
      <div class="parent active">
        <div class="ligne">
          <div class="content"></div>
          <div class="content"></div>
          <div class="content"></div>
        </div>

        <div class="ligne">
          <div class="content"></div>
          <div class="content"></div>
          <div class="content"></div>
        </div>

        <div class="ligne">
          <div class="content"></div>
          <div class="content"></div>
          <div class="content"></div>
        </div>
      </div>
    </main>
  </body>
  <script src="script.js" type="module"></script>
</html>
